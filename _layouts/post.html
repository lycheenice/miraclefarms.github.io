---
layout: default
---
<article class="post-article">
  <header class="post-header">
    <p class="eyebrow">{{ page.category | default: 'Field Note' }}</p>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
      <span>{{ page.author | default: site.author.name }}</span>
    </div>
    {% if page.intro %}
    <p class="post-intro">{{ page.intro }}</p>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
